name: daily-pipeline

# Scheduled production run (PRD Phase B / section 15):
#   collect -> classify (LLM) -> match -> resolve -> build aggregates, then commit
#   refreshed data/ + docs/data/ back to the repo and publish docs/ to GitHub Pages.
# NEVER touches reviews.jsonl (human-owned).

on:
  schedule:
    - cron: "0 11 * * *"   # 11:00 UTC daily; bump frequency later within rate limits
  workflow_dispatch: {}      # allow manual runs from the Actions tab

permissions:
  contents: write            # commit refreshed artifacts back to the repo
  pages: write               # deploy to GitHub Pages
  id-token: write            # required by the Pages deploy action

concurrency:
  group: daily-pipeline
  cancel-in-progress: false  # never interrupt a run mid-commit

jobs:
  run:
    runs-on: ubuntu-latest
    outputs:
      page_artifact: ${{ steps.upload.outputs.artifact_id }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        # The pipeline is idempotent (since_id state + classification/verdict caches),
        # so retrying is safe and cheap — it absorbs transient X/Anthropic API hiccups
        # (rate limits, 5xx) that would otherwise fail the whole scheduled run.
        run: |
          for attempt in 1 2 3; do
            if python -m src.pipeline; then
              exit 0
            fi
            echo "::warning::pipeline attempt $attempt failed; retrying in 30s"
            sleep 30
          done
          echo "::error::pipeline failed after 3 attempts"
          exit 1

      - name: Commit refreshed data + dashboard JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage all per-sport pipeline artifacts + dashboard JSON, then unstage any
          # reviews.jsonl (human-owned, must never be committed by CI).
          git add data docs/data || true
          git reset -q -- ':(glob)data/**/reviews.jsonl' 'data/reviews.jsonl' 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily pipeline refresh [skip ci]"
            git push
          fi

      - name: Upload Pages artifact
        id: upload
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy:
    needs: run
    runs-on: ubuntu-latest
    # Share the Pages concurrency group with deploy-pages.yml so the two never deploy
    # to the github-pages environment at the same time.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deploy2.outputs.page_url || steps.deploy.outputs.page_url }}
    steps:
      # GitHub Pages deploys occasionally return a transient "Deployment failed, try
      # again later". Attempt 1 is allowed to fail; if it does, wait and retry once.
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Wait before retry
        if: steps.deploy.outcome == 'failure'
        run: sleep 45
      - name: Deploy to GitHub Pages (retry)
        id: deploy2
        if: steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@v5
